version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kscsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ks
      POSTGRES_PASSWORD: ks
      POSTGRES_DB: kscsm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ks"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kscsm-network

  redis:
    image: redis:7-alpine
    container_name: kscsm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kscsm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kscsm-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ks:ks@postgres:5432/kscsm
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kscsm-network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kscsm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kscsm-network

volumes:
  postgres_data:
  redis_data:

networks:
  kscsm-network:
    driver: bridge
